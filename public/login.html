<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Iniciar Sesión - CHAMBA</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary": "#000000",
            "primary": "#FFFFFF",
            "secondary": "#A0A0A0",
            "on-background": "#FFFFFF",
            "background": "#000000",
            "surface": "#131313",
            "surface-variant": "#1A1A1A",
            "outline": "#333333",
            "error": "#FF4444",
          },
          "borderRadius": { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
          "fontFamily": {
            "display-xl": ["Bricolage Grotesque", "sans-serif"],
            "body-md": ["Space Grotesk", "sans-serif"],
            "label-bold": ["Space Grotesk", "sans-serif"],
            "headline-lg": ["Bricolage Grotesque", "sans-serif"],
            "label-sm": ["Space Grotesk", "sans-serif"],
            "headline-md": ["Bricolage Grotesque", "sans-serif"],
          },
          "fontSize": {
            "label-bold": ["16px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "headline-lg": ["64px", {"lineHeight": "1", "letterSpacing": "-0.03em", "fontWeight": "800"}],
            "label-sm": ["13px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "600"}],
            "headline-md": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .neo-shadow { box-shadow: 4px 4px 0px 0px #333; }
    .neo-shadow-lg { box-shadow: 8px 8px 0px 0px #333; }
    .neo-shadow-active:active { box-shadow: 0px 0px 0px 0px #333; transform: translate(4px, 4px); }
    #theme-toggle { cursor: pointer; transition: transform 0.3s ease; }
    #theme-toggle:hover { transform: rotate(15deg); }
    html.light { --bg: #fbf9f8; --surface: #ffffff; --surface-var: #e3e2e2; --text: #1b1c1c; --text-sec: #4a4a4a; --border: #000000; --shadow: rgba(0,0,0,1); }
    html.light body { background: var(--bg); color: var(--text); }
    html.light .neo-shadow { box-shadow: 4px 4px 0px 0px var(--shadow); }
    html.light .neo-shadow-lg { box-shadow: 8px 8px 0px 0px var(--shadow); }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-white selection:text-black">
  <header class="w-full sticky top-0 z-50 bg-background/95 backdrop-blur-md border-b-4 border-outline">
    <nav class="max-w-[1200px] mx-auto px-6 h-20 flex justify-between items-center">
      <a class="font-display-xl text-4xl uppercase tracking-tighter text-primary" href="/">CHAMBA</a>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" onclick="toggleTheme()" class="p-2 text-primary hover:bg-surface-variant rounded-full transition-colors" aria-label="Cambiar tema">
          <span class="material-symbols-outlined text-[24px]">light_mode</span>
        </button>
        <a href="/registro.html" class="bg-primary text-on-primary font-label-bold text-label-bold uppercase px-6 py-3 border-2 border-outline neo-shadow neo-shadow-active">Crear cuenta</a>
      </div>
    </nav>
  </header>

  <main class="flex-1 flex items-center justify-center py-20 px-6">
    <div class="bg-surface border-4 border-outline neo-shadow-lg p-12 w-full max-w-md">
      <div class="text-center mb-10">
        <span class="material-symbols-outlined text-[64px] text-primary">person</span>
        <h1 class="font-display-xl text-headline-md uppercase mt-4 text-primary">Iniciar<br/>Sesión</h1>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Email</label>
          <input type="email" id="email" required class="w-full px-4 py-3 border-4 border-outline bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors placeholder-secondary" placeholder="tu@email.com"/>
        </div>
        <div>
          <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Contraseña</label>
          <input type="password" id="password" required class="w-full px-4 py-3 border-4 border-outline bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors placeholder-secondary" placeholder="••••••••"/>
        </div>
        <div id="error-msg" class="hidden bg-error/10 border-4 border-error p-4 text-error font-label-bold text-sm uppercase"></div>
        <button type="submit" class="w-full bg-primary text-on-primary px-10 py-4 font-label-bold uppercase tracking-widest text-sm border-4 border-outline neo-shadow transition-all hover:-translate-y-0.5 hover:shadow-none">ENTRAR</button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-secondary text-sm">¿No tienes cuenta? <a href="/registro.html" class="font-label-bold text-primary underline decoration-4 underline-offset-4 hover:text-white transition-colors">Regístrate aquí</a></p>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('error-msg');
      errorDiv.classList.add('hidden');

      const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (!res.ok) {
          errorDiv.textContent = result.error;
          errorDiv.classList.remove('hidden');
          return;
        }

        localStorage.setItem('user', JSON.stringify(result));

        if (result.tipo === 'empresa') {
          window.location.href = '/dashboard.html';
        } else {
          window.location.href = '/';
        }
      } catch (err) {
        errorDiv.textContent = 'Error de conexión';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
  <script src="/js/theme.js"></script>
</body>
</html>
