<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Panel de Empresa - CHAMBA</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary": "#000000",
            "primary": "#FFFFFF",
            "secondary": "#A0A0A0",
            "on-background": "#FFFFFF",
            "background": "#000000",
            "surface": "#131313",
            "surface-variant": "#1A1A1A",
            "outline": "#333333",
            "error": "#FF4444",
            "job-green": "#00C853",
            "inverse-on-surface": "#f2f0ef",
            "dark-text": "#E0E0E0",
            "surface-tint": "#FFFFFF",
            "secondary-fixed-dim": "#FFFFFF",
            "on-surface": "#FFFFFF",
            "on-primary-container": "#FFFFFF",
            "dark-bg": "#0A0A0A",
            "tertiary-fixed": "#FFFFFF",
            "on-tertiary-container": "#FFFFFF",
            "on-error": "#ffffff",
            "error-container": "#93000a",
            "on-secondary": "#000000",
            "tertiary": "#FFFFFF",
            "on-tertiary-fixed": "#000000",
            "on-tertiary-fixed-variant": "#FFFFFF",
            "inverse-primary": "#000000",
            "tertiary-container": "#131313",
            "surface-container": "#131313",
            "on-secondary-fixed-variant": "#FFFFFF",
            "primary-fixed-dim": "#FFFFFF",
            "surface-container-low": "#0A0A0A",
            "surface-container-highest": "#1A1A1A",
            "surface-bright": "#131313",
            "surface-dim": "#0A0A0A",
            "primary-container": "#111111",
            "secondary-container": "#131313",
            "on-error-container": "#ffffff",
            "on-primary-fixed": "#000000",
            "on-secondary-container": "#FFFFFF",
            "tertiary-fixed-dim": "#FFFFFF",
            "on-tertiary": "#000000",
            "on-surface-variant": "#A0A0A0",
            "dark-surface": "#131313",
            "inverse-surface": "#FFFFFF",
            "surface-container-lowest": "#000000",
            "primary-fixed": "#FFFFFF",
            "on-primary-fixed-variant": "#000000",
            "secondary-fixed": "#131313",
            "outline-variant": "#333333",
            "surface-container-high": "#1A1A1A",
            "on-secondary-fixed": "#000000",
          },
          "borderRadius": { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
          "fontFamily": {
            "display-xl": ["Bricolage Grotesque", "sans-serif"],
            "body-md": ["Space Grotesk", "sans-serif"],
            "label-bold": ["Space Grotesk", "sans-serif"],
            "headline-lg": ["Bricolage Grotesque", "sans-serif"],
            "label-sm": ["Space Grotesk", "sans-serif"],
            "headline-md": ["Bricolage Grotesque", "sans-serif"],
          },
          "fontSize": {
            "label-bold": ["16px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "headline-lg": ["64px", {"lineHeight": "1", "letterSpacing": "-0.03em", "fontWeight": "800"}],
            "label-sm": ["13px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "600"}],
            "headline-md": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
            "headline-lg-mobile": ["42px", {"lineHeight": "1", "letterSpacing": "-0.03em", "fontWeight": "800"}],
          },
          "spacing": {
            "sm": "8px",
            "xs": "4px",
            "base": "4px",
            "container-max": "1200px",
            "lg": "24px",
            "md": "16px",
            "xl": "40px",
            "gutter": "24px"
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .neo-shadow { box-shadow: 4px 4px 0px 0px #FFFFFF; }
    .neo-shadow-lg { box-shadow: 8px 8px 0px 0px #FFFFFF; }
    .neo-shadow-active:active { box-shadow: 0px 0px 0px 0px #333; transform: translate(4px, 4px); }
    .tab-active { border-bottom: 4px solid #fff; font-weight: 700; }
    html.light .tab-active { border-bottom-color: #000; }
    #theme-toggle { cursor: pointer; transition: transform 0.3s ease; }
    #theme-toggle:hover { transform: rotate(15deg); }
    html.light { --bg: #fbf9f8; --surface: #ffffff; --surface-var: #f5f3f2; --text: #1b1c1c; --text-sec: #5e5e5e; --border: #000000; --shadow: rgba(0,0,0,1); }
    html.light body { background: var(--bg); color: var(--text); }
    html.light .neo-shadow { box-shadow: 4px 4px 0px 0px var(--shadow); }
    html.light .neo-shadow-lg { box-shadow: 8px 8px 0px 0px var(--shadow); }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary selection:text-black">
  <header class="w-full sticky top-0 z-50 bg-background/95 backdrop-blur-md border-b-4 border-primary">
    <nav class="max-w-[1200px] mx-auto px-6 h-20 flex justify-between items-center">
      <div class="flex items-center gap-10">
        <a class="font-display-xl text-4xl uppercase tracking-tighter text-primary" href="/">CHAMBA</a>
        <div class="hidden md:flex gap-8">
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-primary border-b-4 border-primary pb-1" href="#mis-empleos">Mis Empleos</a>
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-secondary hover:text-primary transition-all" href="#publicar">Publicar</a>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" onclick="toggleTheme()" class="p-2 text-primary hover:bg-surface-variant rounded-full transition-colors" aria-label="Cambiar tema">
          <span class="material-symbols-outlined text-[24px]">light_mode</span>
        </button>
        <span class="font-label-bold text-label-sm text-secondary" id="user-name"></span>
        <button onclick="logout()" class="bg-surface border-2 border-primary text-primary px-6 py-2 font-label-bold uppercase text-sm neo-shadow transition-all hover:-translate-y-0.5">SALIR</button>
      </div>
    </nav>
  </header>

  <main class="flex-1 py-12 px-6">
    <div class="max-w-[1200px] mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="bg-surface border-4 border-primary neo-shadow p-8 text-center">
          <p class="font-display-xl text-4xl text-primary" id="stat-empleos">0</p>
          <p class="font-label-bold uppercase text-sm text-secondary mt-2">Empleos publicados</p>
        </div>
        <div class="bg-surface border-4 border-primary neo-shadow p-8 text-center">
          <p class="font-display-xl text-4xl text-primary" id="stat-postulaciones">0</p>
          <p class="font-label-bold uppercase text-sm text-secondary mt-2">Postulaciones recibidas</p>
        </div>
        <div class="bg-surface border-4 border-primary neo-shadow p-8 text-center">
          <p class="font-display-xl text-4xl text-primary" id="stat-activos">0</p>
          <p class="font-label-bold uppercase text-sm text-secondary mt-2">Empleos activos</p>
        </div>
      </div>

      <div class="flex gap-8 border-b-4 border-primary mb-10">
        <button onclick="mostrarSeccion('mis-empleos')" class="pb-4 font-label-bold uppercase text-sm tab-active text-primary" id="tab-mis-empleos">Mis Empleos</button>
        <button onclick="mostrarSeccion('publicar')" class="pb-4 font-label-bold uppercase text-sm text-secondary hover:text-primary transition-colors" id="tab-publicar">Publicar Nuevo</button>
        <button onclick="mostrarSeccion('postulaciones')" class="pb-4 font-label-bold uppercase text-sm text-secondary hover:text-primary transition-colors" id="tab-postulaciones">Postulaciones</button>
      </div>

      <section id="seccion-mis-empleos">
        <div id="mis-empleos-list" class="space-y-4"></div>
      </section>

      <section id="seccion-publicar" class="hidden">
        <div class="bg-surface border-4 border-primary neo-shadow-lg p-10 max-w-2xl">
          <h2 class="font-headline-md text-3xl uppercase mb-8 text-primary">Nuevo empleo</h2>
          <form id="nuevoEmpleoForm" class="space-y-6">
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Título del puesto</label>
              <input type="text" id="titulo" required class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors placeholder-secondary" placeholder="Ej: Desarrollador Web"/>
            </div>
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Nombre de la empresa</label>
              <input type="text" id="empresa" required class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors placeholder-secondary"/>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Categoría</label>
                <select id="categoria" class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none appearance-none cursor-pointer" required>
                  <option value="">Seleccionar...</option>
                  <option value="Informática y Programación">Informática</option>
                  <option value="Ventas y Comercial">Ventas</option>
                  <option value="Finanzas y Contabilidad">Finanzas</option>
                  <option value="Ingeniería y Técnico">Ingeniería</option>
                  <option value="Servicio al Cliente">Servicio al Cliente</option>
                  <option value="Administración de Empresas">Administración</option>
                  <option value="Recursos Humanos">RRHH</option>
                  <option value="Marketing y Comunicación">Marketing</option>
                  <option value="Logística, Almacén y Compras">Logística</option>
                </select>
              </div>
              <div>
                <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Departamento</label>
                <select id="departamentos" class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none appearance-none cursor-pointer" required>
                  <option value="">Seleccionar...</option>
                  <option value="Atlántida">Atlántida</option>
                  <option value="Choluteca">Choluteca</option>
                  <option value="Colón">Colón</option>
                  <option value="Comayagua">Comayagua</option>
                  <option value="Copán">Copán</option>
                  <option value="Cortés">Cortés</option>
                  <option value="El Paraíso">El Paraíso</option>
                  <option value="Francisco Morazán">Francisco Morazán</option>
                  <option value="Gracias a Dios">Gracias a Dios</option>
                  <option value="Intibucá">Intibucá</option>
                  <option value="Islas de la Bahía">Islas de la Bahía</option>
                  <option value="La Paz">La Paz</option>
                  <option value="Lempira">Lempira</option>
                  <option value="Ocotepeque">Ocotepeque</option>
                  <option value="Olancho">Olancho</option>
                  <option value="Santa Bárbara">Santa Bárbara</option>
                  <option value="Valle">Valle</option>
                  <option value="Yoro">Yoro</option>
                </select>
              </div>
            </div>
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Descripción</label>
              <textarea id="descripcion" rows="4" class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors resize-none placeholder-secondary" placeholder="Describe el puesto, requisitos y beneficios..."></textarea>
            </div>
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Fecha límite</label>
              <input type="date" id="fecha_limite" class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors" required/>
            </div>
            <button type="submit" class="w-full bg-primary text-on-primary px-10 py-4 font-label-bold uppercase tracking-widest text-sm border-4 border-primary neo-shadow transition-all hover:-translate-y-0.5 hover:shadow-none">PUBLICAR EMPLEO</button>
          </form>
        </div>
      </section>

      <section id="seccion-postulaciones" class="hidden">
        <div id="postulaciones-list" class="space-y-4"></div>
      </section>
    </div>
  </main>

  <div id="modal-empleo"></div>

  <footer class="bg-black text-white w-full border-t-4 border-primary mt-20">
    <div class="max-w-[1200px] mx-auto px-6 py-10 flex flex-col sm:flex-row justify-between items-center gap-6">
      <p class="font-label-bold text-label-sm uppercase opacity-50">© 2026 CHAMBA. TODOS LOS DERECHOS RESERVADOS.</p>
      <p class="font-label-bold text-label-sm uppercase tracking-widest opacity-50">CONSTRUIDA PARA LOS VALIENTES</p>
    </div>
  </footer>

  <script src="js/dashboard.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
