<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Panel de Empresa - Chamba.com</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary": "#ffffff",
            "background": "#fbf9f8",
            "primary": "#000000",
            "secondary": "#4a4a4a",
            "on-background": "#1b1c1c",
          },
          "borderRadius": { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
          "fontFamily": {
            "label-bold": ["Space Grotesk"],
            "body-md": ["Space Grotesk"],
            "headline-md": ["Bricolage Grotesque"],
            "headline-lg": ["Bricolage Grotesque"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .brutalist-card { border: 3px solid #000; box-shadow: 6px 6px 0px 0px rgba(0,0,0,1); }
    .brutalist-btn { border: 2px solid #000; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); transition: all 0.1s ease; }
    .brutalist-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 0 rgba(0,0,0,1); }
    .glass-header { backdrop-filter: blur(8px); background-color: rgba(251, 249, 249, 0.95); }
    .form-input { width: 100%; padding: 12px 14px; border: 3px solid #000; background: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; }
    .form-input:focus { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
    .form-select { width: 100%; padding: 12px 14px; border: 3px solid #000; background: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; appearance: none; cursor: pointer; }
    .tab-active { border-bottom: 3px solid #000; font-weight: 700; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
  <header class="sticky top-0 z-50 flex justify-between items-center px-6 py-4 glass-header w-full border-b-[3px] border-primary">
    <div class="flex items-center gap-10">
      <a href="/" class="font-headline-md text-[32px] font-black text-primary tracking-tighter uppercase">Chamba.com</a>
      <nav class="hidden lg:flex gap-8">
        <a class="font-label-bold text-primary hover:underline decoration-[3px] underline-offset-8" href="#mis-empleos">MIS EMPLEOS</a>
        <a class="font-label-bold text-primary/60 hover:text-primary transition-colors" href="#publicar">PUBLICAR</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <span class="font-label-bold text-sm" id="user-name"></span>
      <button onclick="logout()" class="brutalist-btn bg-white text-primary px-6 py-2 font-label-bold uppercase text-sm">SALIR</button>
    </div>
  </header>

  <main class="flex-1 py-12 px-6">
    <div class="max-w-6xl mx-auto">
      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="brutalist-card bg-white p-8 text-center">
          <p class="font-headline-md text-4xl" id="stat-empleos">0</p>
          <p class="font-label-bold uppercase text-sm text-secondary mt-2">Empleos publicados</p>
        </div>
        <div class="brutalist-card bg-white p-8 text-center">
          <p class="font-headline-md text-4xl" id="stat-postulaciones">0</p>
          <p class="font-label-bold uppercase text-sm text-secondary mt-2">Postulaciones recibidas</p>
        </div>
        <div class="brutalist-card bg-white p-8 text-center">
          <p class="font-headline-md text-4xl" id="stat-activos">0</p>
          <p class="font-label-bold uppercase text-sm text-secondary mt-2">Empleos activos</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex gap-8 border-b-[3px] border-black mb-10">
        <button onclick="mostrarSeccion('mis-empleos')" class="pb-4 font-label-bold uppercase text-sm tab-active" id="tab-mis-empleos">Mis Empleos</button>
        <button onclick="mostrarSeccion('publicar')" class="pb-4 font-label-bold uppercase text-sm text-secondary hover:text-primary" id="tab-publicar">Publicar Nuevo</button>
        <button onclick="mostrarSeccion('postulaciones')" class="pb-4 font-label-bold uppercase text-sm text-secondary hover:text-primary" id="tab-postulaciones">Postulaciones</button>
      </div>

      <!-- Mis Empleos -->
      <section id="seccion-mis-empleos">
        <div id="mis-empleos-list" class="space-y-4"></div>
      </section>

      <!-- Publicar Nuevo -->
      <section id="seccion-publicar" class="hidden">
        <div class="brutalist-card bg-white p-10 max-w-2xl">
          <h2 class="font-headline-md text-3xl uppercase mb-8">Nuevo empleo</h2>
          <form id="nuevoEmpleoForm" class="space-y-6">
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2">Título del puesto</label>
              <input type="text" id="titulo" required class="form-input" placeholder="Ej: Desarrollador Web"/>
            </div>
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2">Nombre de la empresa</label>
              <input type="text" id="empresa" required class="form-input"/>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="font-label-bold text-xs uppercase block mb-2">Categoría</label>
                <select id="categoria" class="form-select" required>
                  <option value="">Seleccionar...</option>
                  <option value="Informática y Programación">Informática</option>
                  <option value="Ventas y Comercial">Ventas</option>
                  <option value="Finanzas y Contabilidad">Finanzas</option>
                  <option value="Ingeniería y Técnico">Ingeniería</option>
                  <option value="Servicio al Cliente">Servicio al Cliente</option>
                  <option value="Administración de Empresas">Administración</option>
                  <option value="Recursos Humanos">RRHH</option>
                  <option value="Marketing y Comunicación">Marketing</option>
                  <option value="Logística, Almacén y Compras">Logística</option>
                </select>
              </div>
              <div>
                <label class="font-label-bold text-xs uppercase block mb-2">Departamento</label>
                <select id="departamentos" class="form-select" required>
                  <option value="">Seleccionar...</option>
                  <option value="Atlántida">Atlántida</option>
                  <option value="Choluteca">Choluteca</option>
                  <option value="Colón">Colón</option>
                  <option value="Comayagua">Comayagua</option>
                  <option value="Copán">Copán</option>
                  <option value="Cortés">Cortés</option>
                  <option value="El Paraíso">El Paraíso</option>
                  <option value="Francisco Morazán">Francisco Morazán</option>
                  <option value="Gracias a Dios">Gracias a Dios</option>
                  <option value="Intibucá">Intibucá</option>
                  <option value="Islas de la Bahía">Islas de la Bahía</option>
                  <option value="La Paz">La Paz</option>
                  <option value="Lempira">Lempira</option>
                  <option value="Ocotepeque">Ocotepeque</option>
                  <option value="Olancho">Olancho</option>
                  <option value="Santa Bárbara">Santa Bárbara</option>
                  <option value="Valle">Valle</option>
                  <option value="Yoro">Yoro</option>
                </select>
              </div>
            </div>
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2">Descripción</label>
              <textarea id="descripcion" rows="4" class="form-input resize-none" placeholder="Describe el puesto, requisitos y beneficios..."></textarea>
            </div>
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2">Fecha límite</label>
              <input type="date" id="fecha_limite" class="form-input" required/>
            </div>
            <button type="submit" class="w-full brutalist-btn bg-primary text-on-primary px-10 py-4 font-label-bold uppercase tracking-widest text-sm">PUBLICAR EMPLEO</button>
          </form>
        </div>
      </section>

      <!-- Postulaciones -->
      <section id="seccion-postulaciones" class="hidden">
        <div id="postulaciones-list" class="space-y-4"></div>
      </section>
    </div>
  </main>

  <div id="modal-empleo"></div>

  <footer class="bg-black text-white w-full px-6 py-10 border-t-[5px] border-primary mt-20">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-6">
      <p class="font-label-sm text-white/40">© 2026 CHAMBA.COM. TODOS LOS DERECHOS RESERVADOS.</p>
      <p class="font-label-sm text-white/40 uppercase tracking-widest">BUILT FOR THE BOLD</p>
    </div>
  </footer>

  <script src="js/dashboard.js"></script>
</body>
</html>
