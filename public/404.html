<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Página no encontrada - CHAMBA</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary": "#000000",
            "primary": "#FFFFFF",
            "secondary": "#A0A0A0",
            "on-background": "#FFFFFF",
            "background": "#000000",
            "surface": "#131313",
            "outline": "#333333",
          },
          "borderRadius": { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
          "fontFamily": {
            "display-xl": ["Bricolage Grotesque", "sans-serif"],
            "body-md": ["Space Grotesk", "sans-serif"],
            "label-bold": ["Space Grotesk", "sans-serif"],
            "headline-lg": ["Bricolage Grotesque", "sans-serif"],
            "label-sm": ["Space Grotesk", "sans-serif"],
            "headline-md": ["Bricolage Grotesque", "sans-serif"],
          },
          "fontSize": {
            "label-bold": ["16px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "headline-lg": ["64px", {"lineHeight": "1", "letterSpacing": "-0.03em", "fontWeight": "800"}],
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .neo-shadow { box-shadow: 4px 4px 0px 0px #333; }
    .neo-shadow-active:active { box-shadow: 0px 0px 0px 0px #333; transform: translate(4px, 4px); }
    .text-stroke { -webkit-text-stroke: 2px #FFFFFF; color: transparent; }
    #theme-toggle { cursor: pointer; transition: transform 0.3s ease; }
    #theme-toggle:hover { transform: rotate(15deg); }
    html.light { --bg: #fbf9f8; --text: #1b1c1c; --text-sec: #4a4a4a; --border: #000000; --shadow: rgba(0,0,0,1); }
    html.light body { background: var(--bg); color: var(--text); }
    html.light .neo-shadow { box-shadow: 4px 4px 0px 0px var(--shadow); }
    html.light .text-stroke { -webkit-text-stroke: 2px #000; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-white selection:text-black">
  <header class="w-full sticky top-0 z-50 bg-background/95 backdrop-blur-md border-b-4 border-outline">
    <nav class="max-w-[1200px] mx-auto px-6 h-20 flex justify-between items-center">
      <a class="font-display-xl text-4xl uppercase tracking-tighter text-primary" href="/">CHAMBA</a>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" onclick="toggleTheme()" class="p-2 text-primary hover:bg-surface-variant rounded-full transition-colors" aria-label="Cambiar tema">
          <span class="material-symbols-outlined text-[24px]">light_mode</span>
        </button>
        <a href="/" class="bg-primary text-on-primary px-8 py-3 font-label-bold uppercase text-sm border-2 border-outline neo-shadow neo-shadow-active">INICIO</a>
      </div>
    </nav>
  </header>

  <main class="flex-1 flex items-center justify-center py-20 px-6">
    <div class="text-center">
      <h1 class="font-display-xl text-[200px] font-black leading-none text-stroke">404</h1>
      <h2 class="font-headline-lg text-headline-lg uppercase mt-4 text-primary">Página no<br/>Encontrada</h2>
      <p class="text-secondary mt-6 mb-10 font-body-lg max-w-md mx-auto">Lo sentimos, la página que buscas no existe o ha sido movida.</p>
      <a href="/" class="bg-primary text-on-primary px-10 py-4 font-label-bold uppercase tracking-widest text-sm inline-flex items-center gap-3 border-2 border-outline neo-shadow transition-all hover:-translate-y-0.5 hover:shadow-none">
        <span class="material-symbols-outlined">home</span> VOLVER AL INICIO
      </a>
    </div>
  </main>

  <script src="js/theme.js"></script>
  <footer class="bg-black text-white w-full border-t-4 border-outline">
    <div class="max-w-[1200px] mx-auto px-6 py-10 flex flex-col sm:flex-row justify-between items-center gap-6">
      <p class="font-label-bold text-label-sm uppercase opacity-50">© 2026 CHAMBA. TODOS LOS DERECHOS RESERVADOS.</p>
      <p class="font-label-bold text-label-sm uppercase tracking-widest opacity-50">CONSTRUIDA PARA LOS VALIENTES</p>
    </div>
  </footer>
</body>
</html>
