<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Publicar Empleo - CHAMBA</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary": "#000000",
            "primary": "#FFFFFF",
            "secondary": "#A0A0A0",
            "on-background": "#FFFFFF",
            "background": "#000000",
            "surface": "#131313",
            "surface-variant": "#1A1A1A",
            "outline": "#333333",
            "error": "#FF4444",
            "job-green": "#00C853",
          },
          "borderRadius": { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
          "fontFamily": {
            "display-xl": ["Bricolage Grotesque", "sans-serif"],
            "body-md": ["Space Grotesk", "sans-serif"],
            "label-bold": ["Space Grotesk", "sans-serif"],
            "headline-lg": ["Bricolage Grotesque", "sans-serif"],
            "label-sm": ["Space Grotesk", "sans-serif"],
            "headline-md": ["Bricolage Grotesque", "sans-serif"],
          },
          "fontSize": {
            "label-bold": ["16px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "headline-lg": ["64px", {"lineHeight": "1", "letterSpacing": "-0.03em", "fontWeight": "800"}],
            "label-sm": ["13px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "600"}],
            "headline-md": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .neo-shadow { box-shadow: 4px 4px 0px 0px #333; }
    .neo-shadow-lg { box-shadow: 8px 8px 0px 0px #333; }
    .neo-shadow-active:active { box-shadow: 0px 0px 0px 0px #333; transform: translate(4px, 4px); }
    #theme-toggle { cursor: pointer; transition: transform 0.3s ease; }
    #theme-toggle:hover { transform: rotate(15deg); }
    html.light { --bg: #fbf9f8; --surface: #ffffff; --surface-var: #e3e2e2; --text: #1b1c1c; --text-sec: #4a4a4a; --border: #000000; --shadow: rgba(0,0,0,1); }
    html.light body { background: var(--bg); color: var(--text); }
    html.light .neo-shadow { box-shadow: 4px 4px 0px 0px var(--shadow); }
    html.light .neo-shadow-lg { box-shadow: 8px 8px 0px 0px var(--shadow); }
  </style>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-white selection:text-black">
  <header class="w-full sticky top-0 z-50 bg-background/95 backdrop-blur-md border-b-4 border-outline">
    <nav class="max-w-[1200px] mx-auto px-6 h-20 flex justify-between items-center">
      <div class="flex items-center gap-10">
        <a class="font-display-xl text-4xl uppercase tracking-tighter text-primary" href="/">CHAMBA</a>
        <nav class="hidden md:flex gap-8">
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-secondary hover:text-primary transition-all" href="/">Inicio</a>
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-primary border-b-4 border-primary pb-1" href="/publicar.html">Publicar</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" onclick="toggleTheme()" class="p-2 text-primary hover:bg-surface-variant rounded-full transition-colors" aria-label="Cambiar tema">
          <span class="material-symbols-outlined text-[24px]">light_mode</span>
        </button>
        <a href="/login.html" class="hidden md:block font-label-bold text-label-bold uppercase text-primary hover:underline decoration-4 underline-offset-4 transition-colors">LOGIN</a>
      </div>
    </nav>
  </header>

  <main class="py-20 px-6">
    <div class="max-w-3xl mx-auto">
      <div id="form-content" class="bg-surface border-4 border-outline neo-shadow-lg p-10 md:p-16">
        <div class="mb-10">
          <div class="inline-block bg-primary text-on-primary px-4 py-1 font-label-bold uppercase text-xs tracking-[0.2em] border-2 border-outline neo-shadow mb-6">
            NUEVA VACANTE
          </div>
          <h1 class="font-display-xl text-headline-md uppercase leading-none text-primary">Publicar<br/>Empleo</h1>
          <p class="text-secondary mt-4 border-l-4 border-primary pl-4 font-label-bold uppercase text-sm">Completa el formulario para publicar tu vacante gratis.</p>
        </div>

        <form id="publicarForm" class="space-y-8">
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Título del puesto</label>
            <input type="text" id="titulo" class="w-full px-4 py-3 border-4 border-outline bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors placeholder-secondary" placeholder="Ej: Desarrollador Web Junior" required/>
          </div>
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Nombre de la empresa</label>
            <input type="text" id="empresa" class="w-full px-4 py-3 border-4 border-outline bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors placeholder-secondary" placeholder="Ej: TechCorp Honduras" required/>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Categoría</label>
              <select id="categoria" class="w-full px-4 py-3 border-4 border-outline bg-surface-variant text-primary font-body-md focus:border-primary outline-none appearance-none cursor-pointer" required>
                <option value="">Seleccionar...</option>
                <option value="Informática y Programación">Informática y Programación</option>
                <option value="Ventas y Comercial">Ventas y Comercial</option>
                <option value="Finanzas y Contabilidad">Finanzas y Contabilidad</option>
                <option value="Ingeniería y Técnico">Ingeniería y Técnico</option>
                <option value="Servicio al Cliente">Servicio al Cliente</option>
                <option value="Administración de Empresas">Administración de Empresas</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
                <option value="Marketing y Comunicación">Marketing y Comunicación</option>
                <option value="Logística, Almacén y Compras">Logística, Almacén y Compras</option>
              </select>
            </div>
            <div>
              <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Departamento</label>
              <select id="departamentos" class="w-full px-4 py-3 border-4 border-outline bg-surface-variant text-primary font-body-md focus:border-primary outline-none appearance-none cursor-pointer" required>
                <option value="">Seleccionar...</option>
                <option value="Atlántida">Atlántida</option>
                <option value="Colón">Colón</option>
                <option value="Comayagua">Comayagua</option>
                <option value="Copán">Copán</option>
                <option value="Cortés">Cortés</option>
                <option value="Choluteca">Choluteca</option>
                <option value="El Paraíso">El Paraíso</option>
                <option value="Francisco Morazán">Francisco Morazán</option>
                <option value="Gracias a Dios">Gracias a Dios</option>
                <option value="Intibucá">Intibucá</option>
                <option value="Islas de la Bahía">Islas de la Bahía</option>
                <option value="La Paz">La Paz</option>
                <option value="Lempira">Lempira</option>
                <option value="Ocotepeque">Ocotepeque</option>
                <option value="Olancho">Olancho</option>
                <option value="Santa Bárbara">Santa Bárbara</option>
                <option value="Valle">Valle</option>
                <option value="Yoro">Yoro</option>
              </select>
            </div>
          </div>
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Descripción del puesto</label>
            <textarea id="descripcion" class="w-full px-4 py-3 border-4 border-outline bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors resize-none placeholder-secondary" rows="5" placeholder="Describe las responsabilidades, requisitos y beneficios del puesto..." required></textarea>
          </div>
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Fecha límite de postulación</label>
            <input type="date" id="fecha_limite" class="w-full px-4 py-3 border-4 border-outline bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors" required/>
          </div>
          <button type="submit" class="w-full bg-primary text-on-primary px-10 py-5 font-label-bold uppercase tracking-widest text-sm border-4 border-outline neo-shadow transition-all hover:-translate-y-0.5 hover:shadow-none">PUBLICAR EMPLEO</button>
        </form>
      </div>

      <div id="success-message" class="hidden bg-surface border-4 border-outline neo-shadow-lg p-16 text-center">
        <span class="material-symbols-outlined text-[80px] text-job-green">check_circle</span>
        <h2 class="font-headline-md text-3xl mt-6 uppercase text-primary">¡Empleo publicado!</h2>
        <p class="text-secondary mt-3 font-label-bold uppercase text-sm">Tu vacante ya está visible en la plataforma</p>
        <a href="/" class="inline-block mt-8 bg-primary text-on-primary px-10 py-4 font-label-bold uppercase text-sm border-2 border-outline neo-shadow transition-all hover:-translate-y-0.5">VER EMPLEOS</a>
      </div>
    </div>
  </main>

  <footer class="bg-black text-white w-full border-t-4 border-outline">
    <div class="max-w-[1200px] mx-auto px-6 py-10 flex flex-col sm:flex-row justify-between items-center gap-6">
      <p class="font-label-bold text-label-sm uppercase opacity-50">© 2026 CHAMBA. TODOS LOS DERECHOS RESERVADOS.</p>
      <p class="font-label-bold text-label-sm uppercase tracking-widest opacity-50">CONSTRUIDA PARA LOS VALIENTES</p>
    </div>
  </footer>

  <script src="js/theme.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.tipo !== 'empresa') {
      window.location.href = '/login.html';
    }

    document.getElementById('publicarForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        titulo: document.getElementById('titulo').value,
        empresa: user.nombre || document.getElementById('empresa').value,
        categoria: document.getElementById('categoria').value,
        departamento: document.getElementById('departamentos').value,
        descripcion: document.getElementById('descripcion').value,
        fecha_limite: document.getElementById('fecha_limite').value
      };
      const res = await fetch('/api/empleos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        document.getElementById('form-content').classList.add('hidden');
        document.getElementById('success-message').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
