<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Publicar Empleo - Chamba.com</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-surface": "#1b1c1c",
            "surface-variant": "#e3e2e2",
            "on-primary": "#ffffff",
            "background": "#fbf9f8",
            "primary": "#000000",
            "secondary": "#5d5f5f",
            "on-background": "#1b1c1c",
          },
          "borderRadius": { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
          "fontFamily": {
            "headline-lg-mobile": ["Bricolage Grotesque"],
            "label-sm": ["Space Grotesk"],
            "label-bold": ["Space Grotesk"],
            "body-md": ["Space Grotesk"],
            "display-xl": ["Bricolage Grotesque"],
            "body-lg": ["Space Grotesk"],
            "headline-md": ["Bricolage Grotesque"],
            "headline-lg": ["Bricolage Grotesque"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .brutalist-card {
      border: 3px solid #000000;
      box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
    }
    .brutalist-btn {
      border: 2px solid #000000;
      box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
      transition: all 0.1s ease;
    }
    .brutalist-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
    }
    .glass-header {
      backdrop-filter: blur(8px);
      background-color: rgba(251, 249, 249, 0.95);
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 3px solid #000;
      background: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      outline: none;
      transition: box-shadow 0.2s;
    }
    .form-input:focus {
      box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
    }
    .form-label {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md">
  <header class="sticky top-0 z-50 flex justify-between items-center px-6 py-4 glass-header w-full border-b-[3px] border-primary">
    <div class="flex items-center gap-10">
      <a href="/" class="font-headline-md text-[32px] font-black text-primary tracking-tighter uppercase">Chamba.com</a>
      <nav class="hidden lg:flex gap-8">
        <a class="font-label-bold text-primary/60 hover:text-primary transition-colors" href="/">INICIO</a>
        <a class="font-label-bold text-primary hover:underline decoration-[3px] underline-offset-8" href="/publicar.html">PUBLICAR</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <a href="/login.html" class="px-6 py-2 text-primary font-label-bold hover:underline decoration-[2px] underline-offset-4">LOGIN</a>
    </div>
  </header>

  <main class="py-20 px-6">
    <div class="max-w-3xl mx-auto">
      <div id="form-content" class="brutalist-card bg-white p-10 md:p-16">
        <div class="mb-10">
          <div class="inline-block bg-primary text-on-primary px-4 py-1 font-label-bold uppercase text-xs tracking-[0.2em] brutalist-btn mb-6">
            NUEVA VACANTE
          </div>
          <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg uppercase leading-none">
            Publicar<br/><span class="italic font-normal">empleo</span>
          </h1>
          <p class="text-secondary mt-4 border-l-4 border-primary pl-4">Completa el formulario para publicar tu vacante gratis.</p>
        </div>

        <form id="publicarForm" class="space-y-8">
          <div>
            <label class="form-label">Título del puesto</label>
            <input type="text" id="titulo" class="form-input" placeholder="Ej: Desarrollador Web Junior" required/>
          </div>
          <div>
            <label class="form-label">Nombre de la empresa</label>
            <input type="text" id="empresa" class="form-input" placeholder="Ej: TechCorp Honduras" required/>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="form-label">Categoría</label>
              <select id="categoria" class="form-input" required>
                <option value="">Seleccionar...</option>
                <option value="Informática y Programación">Informática y Programación</option>
                <option value="Ventas y Comercial">Ventas y Comercial</option>
                <option value="Finanzas y Contabilidad">Finanzas y Contabilidad</option>
                <option value="Ingeniería y Técnico">Ingeniería y Técnico</option>
                <option value="Servicio al Cliente">Servicio al Cliente</option>
                <option value="Administración de Empresas">Administración de Empresas</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
                <option value="Marketing y Comunicación">Marketing y Comunicación</option>
                <option value="Logística, Almacén y Compras">Logística, Almacén y Compras</option>
              </select>
            </div>
            <div>
              <label class="form-label">Departamento</label>
              <select id="departamentos" class="form-input" required>
                <option value="">Seleccionar...</option>
                <option value="Atlántida">Atlántida</option>
                <option value="Colón">Colón</option>
                <option value="Comayagua">Comayagua</option>
                <option value="Copán">Copán</option>
                <option value="Cortés">Cortés</option>
                <option value="Choluteca">Choluteca</option>
                <option value="El Paraíso">El Paraíso</option>
                <option value="Francisco Morazán">Francisco Morazán</option>
                <option value="Gracias a Dios">Gracias a Dios</option>
                <option value="Intibucá">Intibucá</option>
                <option value="Islas de la Bahía">Islas de la Bahía</option>
                <option value="La Paz">La Paz</option>
                <option value="Lempira">Lempira</option>
                <option value="Ocotepeque">Ocotepeque</option>
                <option value="Olancho">Olancho</option>
                <option value="Santa Bárbara">Santa Bárbara</option>
                <option value="Valle">Valle</option>
                <option value="Yoro">Yoro</option>
              </select>
            </div>
          </div>
          <div>
            <label class="form-label">Descripción del puesto</label>
            <textarea id="descripcion" class="form-input" rows="5" placeholder="Describe las responsabilidades, requisitos y beneficios del puesto..." required></textarea>
          </div>
          <div>
            <label class="form-label">Fecha límite de postulación</label>
            <input type="date" id="fecha_limite" class="form-input" required/>
          </div>
          <button type="submit" class="w-full brutalist-btn bg-primary text-on-primary px-10 py-5 font-label-bold uppercase tracking-widest text-sm hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
            PUBLICAR EMPLEO
          </button>
        </form>
      </div>

      <div id="success-message" class="hidden brutalist-card bg-white p-16 text-center">
        <span class="material-symbols-outlined text-[80px] text-green-600">check_circle</span>
        <h2 class="font-headline-md text-3xl mt-6 uppercase">¡Empleo publicado!</h2>
        <p class="text-secondary mt-3">Tu vacante ya está visible en la plataforma</p>
        <a href="/" class="inline-block mt-8 brutalist-btn bg-primary text-on-primary px-10 py-4 font-label-bold uppercase text-sm">VER EMPLEOS</a>
      </div>
    </div>
  </main>

  <footer class="bg-black text-white w-full px-6 py-10 border-t-[5px] border-primary">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-6">
      <p class="font-label-sm text-white/40">© 2026 CHAMBA.COM. TODOS LOS DERECHOS RESERVADOS.</p>
      <p class="font-label-sm text-white/40 uppercase tracking-widest">BUILT FOR THE BOLD</p>
    </div>
  </footer>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.tipo !== 'empresa') {
      window.location.href = '/login.html';
    }

    const API_URL = window.location.hostname.includes('netlify.app')
      ? '/.netlify/functions/empleos'
      : '/api/empleos';

    document.getElementById('publicarForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        titulo: document.getElementById('titulo').value,
        empresa: user.nombre || document.getElementById('empresa').value,
        categoria: document.getElementById('categoria').value,
        departamento: document.getElementById('departamentos').value,
        descripcion: document.getElementById('descripcion').value,
        fecha_limite: document.getElementById('fecha_limite').value
      };
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        document.getElementById('form-content').classList.add('hidden');
        document.getElementById('success-message').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
