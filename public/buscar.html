<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Búsqueda Avanzada - Chamba.com</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-surface": "#1b1c1c",
            "on-primary": "#ffffff",
            "background": "#fbf9f8",
            "primary": "#000000",
            "secondary": "#4a4a4a",
            "on-background": "#1b1c1c",
          },
          "borderRadius": { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
          "fontFamily": {
            "label-sm": ["Space Grotesk"],
            "label-bold": ["Space Grotesk"],
            "body-md": ["Space Grotesk"],
            "headline-md": ["Bricolage Grotesque"],
            "headline-lg": ["Bricolage Grotesque"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .brutalist-card { border: 3px solid #000; box-shadow: 6px 6px 0px 0px rgba(0,0,0,1); transition: all 0.2s ease; }
    .brutalist-card:hover { transform: translate(-2px, -2px); box-shadow: 10px 10px 0px 0px rgba(0,0,0,1); }
    .brutalist-btn { border: 2px solid #000; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); transition: all 0.1s ease; }
    .brutalist-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 0 rgba(0,0,0,1); }
    .glass-header { backdrop-filter: blur(8px); background-color: rgba(251, 249, 249, 0.95); }
    .form-select { width: 100%; padding: 12px 14px; border: 3px solid #000; background: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; appearance: none; cursor: pointer; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary selection:text-on-primary">
  <header class="sticky top-0 z-50 flex justify-between items-center px-6 py-4 glass-header w-full border-b-[3px] border-primary">
    <div class="flex items-center gap-10">
      <a href="/" class="font-headline-md text-[32px] font-black text-primary tracking-tighter uppercase">Chamba.com</a>
      <nav class="hidden lg:flex gap-8">
        <a class="font-label-bold text-primary/60 hover:text-primary transition-colors" href="/">INICIO</a>
        <a class="font-label-bold text-primary hover:underline decoration-[3px] underline-offset-8" href="/buscar.html">EXPLORAR</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <a href="/login.html" class="px-6 py-2 text-primary font-label-bold hover:underline decoration-[2px] underline-offset-4">LOGIN</a>
      <a href="/publicar.html" class="brutalist-btn bg-primary text-on-primary px-8 py-3 font-label-bold uppercase text-sm tracking-widest">Publicar</a>
    </div>
  </header>

  <main class="py-12 px-6">
    <div class="max-w-6xl mx-auto">
      <div class="mb-10">
        <h1 class="font-headline-lg text-headline-lg uppercase leading-none">Búsqueda<br/><span class="italic font-normal">avanzada</span></h1>
      </div>

      <!-- Filtros -->
      <div class="brutalist-card bg-white p-8 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2">Buscar</label>
            <input id="busqueda" type="text" placeholder="Título, empresa..." class="w-full px-4 py-3 border-[3px] border-black font-body-md focus:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] outline-none"/>
          </div>
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2">Categoría</label>
            <select id="categoria" class="form-select">
              <option value="">Todas</option>
              <option value="Informática y Programación">Informática</option>
              <option value="Ventas y Comercial">Ventas</option>
              <option value="Finanzas y Contabilidad">Finanzas</option>
              <option value="Ingeniería y Técnico">Ingeniería</option>
              <option value="Servicio al Cliente">Servicio al Cliente</option>
              <option value="Administración de Empresas">Administración</option>
              <option value="Recursos Humanos">RRHH</option>
              <option value="Marketing y Comunicación">Marketing</option>
              <option value="Logística, Almacén y Compras">Logística</option>
            </select>
          </div>
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2">Departamento</label>
            <select id="departamentos" class="form-select">
              <option value="">Todos</option>
              <option value="Cortés">Cortés</option>
              <option value="Francisco Morazán">Francisco Morazán</option>
              <option value="Colón">Colón</option>
              <option value="Comayagua">Comayagua</option>
              <option value="Choluteca">Choluteca</option>
              <option value="Valle">Valle</option>
              <option value="Yoro">Yoro</option>
              <option value="Olancho">Olancho</option>
              <option value="La Paz">La Paz</option>
              <option value="Atlántida">Atlántida</option>
            </select>
          </div>
          <div class="flex items-end">
            <button id="btnBuscar" class="w-full brutalist-btn bg-primary text-on-primary px-8 py-3 font-label-bold uppercase flex items-center justify-center gap-2">
              <span class="material-symbols-outlined">search</span> BUSCAR
            </button>
          </div>
        </div>
      </div>

      <p class="text-secondary font-label-bold mb-6" id="job-count"></p>

      <div id="empleos-list" class="space-y-6"></div>
      <div id="pagination"></div>
    </div>
  </main>

  <div id="modal-empleo"></div>

  <footer class="bg-black text-white w-full px-6 py-10 border-t-[5px] border-primary mt-20">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-6">
      <p class="font-label-sm text-white/40">© 2026 CHAMBA.COM. TODOS LOS DERECHOS RESERVADOS.</p>
      <p class="font-label-sm text-white/40 uppercase tracking-widest">BUILT FOR THE BOLD</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
