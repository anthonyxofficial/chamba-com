<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.classList.add(t);
    })();
  </script>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Búsqueda Avanzada - CHAMBA</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "var(--ch-primary)",
            "on-primary": "var(--ch-on-primary)",
            "background": "var(--ch-background)",
            "surface": "var(--ch-surface)",
            "surface-variant": "var(--ch-surface-variant)",
            "on-background": "var(--ch-on-background)",
            "on-surface": "var(--ch-on-surface)",
            "on-surface-variant": "var(--ch-on-surface-variant)",
            "secondary": "var(--ch-secondary)",
            "outline": "var(--ch-outline)",
            "outline-variant": "var(--ch-outline-variant)",
            "error": "var(--ch-error)",
            "favorite": "var(--ch-favorite)",
            "primary-container": "var(--ch-primary-container)",
            "on-primary-container": "var(--ch-on-primary-container)",
            "surface-container": "var(--ch-surface-container)",
            "surface-container-low": "var(--ch-surface-container-low)",
            "surface-container-high": "var(--ch-surface-container-high)",
            "surface-container-highest": "var(--ch-surface-container-highest)",
            "surface-container-lowest": "var(--ch-surface-container-lowest)",
            "surface-bright": "var(--ch-surface-bright)",
            "surface-dim": "var(--ch-surface-dim)",
            "inverse-surface": "var(--ch-inverse-surface)",
            "inverse-on-surface": "var(--ch-inverse-on-surface)",
            "inverse-primary": "var(--ch-inverse-primary)",
            "tertiary": "var(--ch-tertiary)",
            "tertiary-container": "var(--ch-tertiary-container)",
            "on-tertiary": "var(--ch-on-tertiary)",
            "on-tertiary-container": "var(--ch-on-tertiary-container)",
            "secondary-container": "var(--ch-secondary-container)",
            "on-secondary": "var(--ch-on-secondary)",
            "on-secondary-container": "var(--ch-on-secondary-container)",
            "dark-bg": "var(--ch-dark-bg)",
            "dark-surface": "var(--ch-dark-surface)",
            "dark-text": "var(--ch-dark-text)",
            "on-error": "var(--ch-on-error)",
            "error-container": "var(--ch-error-container)",
            "on-error-container": "var(--ch-on-error-container)",
            "surface-tint": "var(--ch-surface-tint)",
            "primary-fixed": "var(--ch-primary-fixed)",
            "primary-fixed-dim": "var(--ch-primary-fixed-dim)",
            "on-primary-fixed": "var(--ch-on-primary-fixed)",
            "on-primary-fixed-variant": "var(--ch-on-primary-fixed-variant)",
            "secondary-fixed": "var(--ch-secondary-fixed)",
            "secondary-fixed-dim": "var(--ch-secondary-fixed-dim)",
            "on-secondary-fixed": "var(--ch-on-secondary-fixed)",
            "on-secondary-fixed-variant": "var(--ch-on-secondary-fixed-variant)",
            "tertiary-fixed": "var(--ch-tertiary-fixed)",
            "tertiary-fixed-dim": "var(--ch-tertiary-fixed-dim)",
            "on-tertiary-fixed": "var(--ch-on-tertiary-fixed)",
            "on-tertiary-fixed-variant": "var(--ch-on-tertiary-fixed-variant)"
          },
          "spacing": {
            "sm": "8px",
            "xs": "4px",
            "base": "4px",
            "container-max": "1200px",
            "lg": "24px",
            "md": "16px",
            "xl": "40px",
            "gutter": "24px"
          },
          "borderRadius": { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
          "fontFamily": {
            "display-xl": ["Bricolage Grotesque", "sans-serif"],
            "body-md": ["Space Grotesk", "sans-serif"],
            "label-bold": ["Space Grotesk", "sans-serif"],
            "headline-lg": ["Bricolage Grotesque", "sans-serif"],
            "label-sm": ["Space Grotesk", "sans-serif"],
            "body-lg": ["Space Grotesk", "sans-serif"],
            "headline-md": ["Bricolage Grotesque", "sans-serif"],
            "headline-lg-mobile": ["Bricolage Grotesque", "sans-serif"]
          },
          "fontSize": {
            "display-xl": ["96px", {"lineHeight": "0.9", "letterSpacing": "-0.05em", "fontWeight": "800"}],
            "body-md": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
            "label-bold": ["16px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "headline-lg": ["64px", {"lineHeight": "1", "letterSpacing": "-0.03em", "fontWeight": "800"}],
            "label-sm": ["13px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "600"}],
            "body-lg": ["22px", {"lineHeight": "1.5", "letterSpacing": "-0.01em", "fontWeight": "400"}],
            "headline-md": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
            "headline-lg-mobile": ["42px", {"lineHeight": "1", "letterSpacing": "-0.03em", "fontWeight": "800"}]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .neo-shadow { box-shadow: 4px 4px 0px 0px var(--ch-stroke); }
    .neo-shadow-lg { box-shadow: 8px 8px 0px 0px var(--ch-stroke); }
    .neo-shadow-hover:hover { box-shadow: 12px 12px 0px 0px var(--ch-stroke); transform: translate(-4px, -4px); }
    .neo-shadow-active:active { box-shadow: 0px 0px 0px 0px var(--ch-stroke); transform: translate(4px, 4px); }
    .pattern-grid { background-image: radial-gradient(var(--ch-pattern) 1px, transparent 0); background-size: 24px 24px; }
    .brutalist-img { filter: grayscale(100%) contrast(120%) brightness(0.8); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .brutalist-card:hover .brutalist-img { filter: grayscale(0%) contrast(100%) brightness(1); }
    .text-stroke { -webkit-text-stroke: 1px var(--ch-stroke); color: transparent; }
    .glow-neon { box-shadow: 0 0 15px var(--ch-shadow); }
    @keyframes subtle-float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
    .float-animation { animation: subtle-float 4s ease-in-out infinite; }
    #theme-toggle { cursor: pointer; transition: transform 0.3s ease; }
    #theme-toggle:hover { transform: rotate(15deg); }
    .mobile-menu-open { overflow: hidden; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden selection:bg-primary selection:text-on-primary page-transition">

  <header class="w-full sticky top-0 z-50 bg-background/95 backdrop-blur-md border-b-4 border-primary">
    <nav class="max-w-[1200px] mx-auto px-6 h-20 flex justify-between items-center">
      <div class="flex items-center gap-10">
        <a class="font-display-xl text-4xl uppercase tracking-tighter text-primary glitch" data-text="CHAMBA" href="/">CHAMBA</a>
        <div class="hidden md:flex gap-8">
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-secondary hover:text-primary transition-all hover:-translate-y-0.5" href="/">Inicio</a>
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-primary border-b-4 border-primary pb-1" href="/buscar.html">Explorar</a>
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-secondary hover:text-primary transition-all hover:-translate-y-0.5" href="/favoritos.html">Guardados</a>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" onclick="toggleTheme()" class="p-2 text-primary hover:bg-surface-variant rounded-full transition-colors" aria-label="Cambiar tema">
          <span class="material-symbols-outlined text-[24px]">light_mode</span>
        </button>
        <a href="/login.html" class="hidden md:block font-label-bold text-label-bold uppercase text-primary hover:underline decoration-4 underline-offset-4 transition-colors">Iniciar Sesión</a>
        <a href="/publicar.html" class="bg-primary text-on-primary font-label-bold text-label-bold uppercase px-6 py-3 border-2 border-primary neo-shadow neo-shadow-active">Publicar Empleo</a>
        <button onclick="openMobileMenu()" class="md:hidden p-2" style="color: var(--ch-primary);" aria-label="Menu">
          <span class="material-symbols-outlined text-[28px]">menu</span>
        </button>
      </div>
    </nav>
  </header>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden fixed inset-0 z-[100] flex flex-col p-gutter" style="background: var(--ch-background); color: var(--ch-on-background);">
    <div class="flex justify-between items-center mb-xl">
      <a class="font-display-xl text-4xl uppercase tracking-tighter glitch" data-text="CHAMBA" style="color: var(--ch-primary);" href="/">CHAMBA</a>
      <button onclick="closeMobileMenu()" class="p-2" style="color: var(--ch-primary);" aria-label="Cerrar menu">
        <span class="material-symbols-outlined text-[32px]">close</span>
      </button>
    </div>
    <nav class="flex flex-col gap-lg">
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/buscar.html" onclick="closeMobileMenu()">Buscar Empleos</a>
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/buscar.html" onclick="closeMobileMenu()">Explorar</a>
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/publicar.html" onclick="closeMobileMenu()">Empresas</a>
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/favoritos.html" onclick="closeMobileMenu()">Guardados</a>
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/login.html" onclick="closeMobileMenu()">Iniciar Sesión</a>
      <a class="font-headline-md text-headline-md uppercase" style="color: var(--ch-primary);" href="/registro.html" onclick="closeMobileMenu()">Crear Cuenta</a>
    </nav>
  </div>

  <main class="py-12 px-6">
    <div class="max-w-[1200px] mx-auto">
      <div class="mb-10">
        <h1 class="font-display-xl text-headline-md md:text-headline-lg uppercase leading-none text-primary">Búsqueda<br/><span class="text-stroke">AVANZADA</span></h1>
      </div>

      <div data-reveal="up" class="bg-surface border-4 border-primary neo-shadow-lg p-8 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Buscar</label>
            <input id="busqueda" type="text" placeholder="Título, empresa..." class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none transition-colors placeholder-secondary"/>
          </div>
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Categoría</label>
            <select id="categoria" class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none appearance-none cursor-pointer">
              <option value="">Todas</option>
              <option value="Informática y Programación">Informática</option>
              <option value="Ventas y Comercial">Ventas</option>
              <option value="Finanzas y Contabilidad">Finanzas</option>
              <option value="Ingeniería y Técnico">Ingeniería</option>
              <option value="Servicio al Cliente">Servicio al Cliente</option>
              <option value="Administración de Empresas">Administración</option>
              <option value="Recursos Humanos">RRHH</option>
              <option value="Marketing y Comunicación">Marketing</option>
              <option value="Logística, Almacén y Compras">Logística</option>
            </select>
          </div>
          <div>
            <label class="font-label-bold text-xs uppercase block mb-2 text-primary">Departamento</label>
            <select id="departamentos" class="w-full px-4 py-3 border-4 border-primary bg-surface-variant text-primary font-body-md focus:border-primary outline-none appearance-none cursor-pointer">
              <option value="">Todos</option>
              <option value="Atlántida">Atlántida</option>
              <option value="Choluteca">Choluteca</option>
              <option value="Colón">Colón</option>
              <option value="Comayagua">Comayagua</option>
              <option value="Copán">Copán</option>
              <option value="Cortés">Cortés</option>
              <option value="El Paraíso">El Paraíso</option>
              <option value="Francisco Morazán">Francisco Morazán</option>
              <option value="Gracias a Dios">Gracias a Dios</option>
              <option value="Intibucá">Intibucá</option>
              <option value="Islas de la Bahía">Islas de la Bahía</option>
              <option value="La Paz">La Paz</option>
              <option value="Lempira">Lempira</option>
              <option value="Ocotepeque">Ocotepeque</option>
              <option value="Olancho">Olancho</option>
              <option value="Santa Bárbara">Santa Bárbara</option>
              <option value="Valle">Valle</option>
              <option value="Yoro">Yoro</option>
            </select>
          </div>
          <div class="flex items-end">
            <button id="btnBuscar" class="w-full bg-primary text-on-primary px-8 py-3 font-label-bold uppercase text-sm border-2 border-primary neo-shadow neo-shadow-active flex items-center justify-center gap-2">
              <span class="material-symbols-outlined">search</span> BUSCAR
            </button>
          </div>
        </div>
      </div>

      <p class="text-secondary font-label-bold uppercase text-sm mb-6" id="job-count"></p>

      <div data-reveal="up" id="empleos-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
      <div id="pagination"></div>
    </div>
  </main>

  <div id="modal-empleo"></div>

  <footer class="bg-inverse-surface text-inverse-primary w-full border-t-4 border-primary mt-20">
    <div class="max-w-[1200px] mx-auto px-6 py-10 flex flex-col sm:flex-row justify-between items-center gap-6">
      <p class="font-label-bold text-label-sm uppercase opacity-50">© 2026 CHAMBA. TODOS LOS DERECHOS RESERVADOS.</p>
      <p class="font-label-bold text-label-sm uppercase tracking-widest opacity-50">CONSTRUIDA PARA LOS VALIENTES</p>
    </div>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
