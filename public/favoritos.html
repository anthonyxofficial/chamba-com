  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .neo-shadow { box-shadow: 4px 4px 0px 0px var(--ch-stroke); }
    .neo-shadow-lg { box-shadow: 8px 8px 0px 0px var(--ch-stroke); }
    .neo-shadow-hover:hover { box-shadow: 12px 12px 0px 0px var(--ch-stroke); transform: translate(-4px, -4px); }
    .neo-shadow-active:active { box-shadow: 0px 0px 0px 0px var(--ch-stroke); transform: translate(4px, 4px); }
    .pattern-grid { background-image: radial-gradient(var(--ch-pattern) 1px, transparent 0); background-size: 24px 24px; }
    .brutalist-img { filter: grayscale(100%) contrast(120%) brightness(0.8); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .brutalist-card:hover .brutalist-img { filter: grayscale(0%) contrast(100%) brightness(1); }
    .text-stroke { -webkit-text-stroke: 1px var(--ch-stroke); color: transparent; }
    .glow-neon { box-shadow: 0 0 15px var(--ch-shadow); }
    @keyframes subtle-float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
    .float-animation { animation: subtle-float 4s ease-in-out infinite; }
    #theme-toggle { cursor: pointer; transition: transform 0.3s ease; }
    #theme-toggle:hover { transform: rotate(15deg); }
    .mobile-menu-open { overflow: hidden; }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary selection:text-on-primary page-transition">
  <header class="w-full sticky top-0 z-50 bg-background/95 backdrop-blur-md border-b-4 border-primary">
    <nav class="max-w-[1200px] mx-auto px-6 h-20 flex justify-between items-center">
      <div class="flex items-center gap-10">
        <a class="font-display-xl text-4xl uppercase tracking-tighter text-primary" href="/">CHAMBA</a>
        <div class="hidden md:flex gap-8">
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-secondary hover:text-primary transition-all" href="/">Inicio</a>
          <a class="font-label-bold text-label-bold uppercase tracking-wider text-primary border-b-4 border-primary pb-1" href="/favoritos.html">Guardados</a>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" onclick="toggleTheme()" class="p-2 text-primary hover:bg-surface-variant rounded-full transition-colors" aria-label="Cambiar tema">
          <span class="material-symbols-outlined text-[24px]">light_mode</span>
        </button>
        <a href="/login.html" class="hidden md:block font-label-bold text-label-bold uppercase text-primary hover:underline decoration-4 underline-offset-4 transition-colors">Iniciar Sesión</a>
        <button onclick="openMobileMenu()" class="md:hidden p-2" style="color: var(--ch-primary);" aria-label="Menu">
          <span class="material-symbols-outlined text-[28px]">menu</span>
        </button>
      </div>
    </nav>
  </header>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden fixed inset-0 z-[100] flex flex-col p-gutter" style="background: var(--ch-background); color: var(--ch-on-background);">
    <div class="flex justify-between items-center mb-xl">
      <a class="font-display-xl text-4xl uppercase tracking-tighter" style="color: var(--ch-primary);" href="/">CHAMBA</a>
      <button onclick="closeMobileMenu()" class="p-2" style="color: var(--ch-primary);" aria-label="Cerrar menu">
        <span class="material-symbols-outlined text-[32px]">close</span>
      </button>
    </div>
    <nav class="flex flex-col gap-lg">
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="#empleos" onclick="closeMobileMenu()">Buscar Empleos</a>
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/buscar.html" onclick="closeMobileMenu()">Explorar</a>
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/publicar.html" onclick="closeMobileMenu()">Empresas</a>
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/favoritos.html" onclick="closeMobileMenu()">Guardados</a>
      <a class="font-headline-md text-headline-md uppercase border-b-2 pb-md" style="color: var(--ch-primary); border-color: var(--ch-outline);" href="/login.html" onclick="closeMobileMenu()">Iniciar Sesión</a>
      <a class="font-headline-md text-headline-md uppercase" style="color: var(--ch-primary);" href="/registro.html" onclick="closeMobileMenu()">Crear Cuenta</a>
    </nav>
  </div>

  <main class="flex-1 py-12 px-6">
    <div data-reveal="up" class="max-w-[1200px] mx-auto">
      <div class="mb-10">
        <h1 class="font-display-xl text-headline-md md:text-headline-lg uppercase leading-none text-primary">Empleos<br/><span class="text-stroke">GUARDADOS</span></h1>
        <p class="text-secondary mt-4 font-label-bold uppercase text-sm" id="fav-count"></p>
      </div>

      <div id="favoritos-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>
  </main>

  <div id="modal-empleo"></div>

  <footer class="bg-inverse-surface text-inverse-primary w-full border-t-4 border-primary mt-20">
    <div class="max-w-[1200px] mx-auto px-6 py-10 flex flex-col sm:flex-row justify-between items-center gap-6">
      <p class="font-label-bold text-label-sm uppercase opacity-50">© 2026 CHAMBA. TODOS LOS DERECHOS RESERVADOS.</p>
      <p class="font-label-bold text-label-sm uppercase tracking-widest opacity-50">CONSTRUIDA PARA LOS VALIENTES</p>
    </div>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/animations.js"></script>
  <script>
    const API_URL = '/api/empleos';
    const COLOR_MAP = { pink: 'job-pink', green: 'job-green', blue: 'job-blue' };
    const TAGS = {
      'Informática y Programación': 'TECNOLOGÍA',
      'Ventas y Comercial': 'VENTAS',
      'Finanzas y Contabilidad': 'FINANZAS',
      'Ingeniería y Técnico': 'INGENIERÍA',
      'Servicio al Cliente': 'SERVICIO',
      'Administración de Empresas': 'ADMIN',
      'Recursos Humanos': 'RRHH',
      'Marketing y Comunicación': 'MARKETING',
      'Logística, Almacén y Compras': 'LOGÍSTICA'
    };
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    function toggleFavorite(id) {
      const index = favorites.indexOf(id);
      if (index === -1) favorites.push(id); else favorites.splice(index, 1);
      localStorage.setItem('favorites', JSON.stringify(favorites));
      cargarFavoritos();
    }

    function getColorForJob(empleo) {
      if (empleo.color && COLOR_MAP[empleo.color]) return empleo.color;
      return ['pink', 'green', 'blue'][empleo.id % 3];
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
      return `${date.getDate()} ${months[date.getMonth()]}, ${date.getFullYear()}`;
    }

    async function cargarFavoritos() {
      const list = document.getElementById('favoritos-list');

      if (favorites.length === 0) {
        document.getElementById('fav-count').textContent = '0 empleos guardados';
        list.innerHTML = `
          <div class="text-center py-20 col-span-full border-4 border-dashed border-primary">
            <span class="material-symbols-outlined text-[64px] text-secondary">favorite_border</span>
            <h3 class="font-headline-md text-xl mt-4 text-primary">No tienes empleos guardados</h3>
            <p class="text-secondary mt-2 mb-6 font-label-bold uppercase text-sm">Haz click en el corazón de cualquier empleo para guardarlo</p>
            <a href="/" class="bg-primary text-on-primary px-8 py-3 font-label-bold uppercase text-sm border-2 border-primary neo-shadow inline-block transition-all hover:-translate-y-0.5">VER EMPLEOS</a>
          </div>`;
        return;
      }

      const res = await fetch(`${API_URL}?limit=100`);
      const data = await res.json();
      const allEmpleos = data.empleos || data;
      const empleos = allEmpleos.filter(e => favorites.includes(e.id));

      document.getElementById('fav-count').textContent = `${empleos.length} empleos guardados`;

      list.innerHTML = empleos.map(e => {
        const color = getColorForJob(e);
        const colorName = COLOR_MAP[color];
        const fecha = formatDate(e.fecha_limite);
        return `
          <div class="bg-surface border-4 border-${colorName} neo-shadow p-6 flex flex-col group">
            <div class="flex items-center justify-between mb-4">
              <div class="w-14 h-14 bg-${colorName}/20 flex items-center justify-center border-2 border-${colorName}">
                <span class="material-symbols-outlined text-${colorName} text-[28px]">favorite</span>
              </div>
              <button onclick="toggleFavorite(${e.id})" class="w-10 h-10 border-2 border-primary flex items-center justify-center hover:border-job-pink transition-colors">
                <span class="material-symbols-outlined text-[20px] text-job-pink">favorite</span>
              </button>
            </div>
            <div class="flex-1">
              <div class="flex gap-2 mb-3 flex-wrap">
                <span class="bg-${colorName} text-on-primary px-2 py-0.5 text-[10px] font-bold uppercase tracking-tighter">${TAGS[e.categoria] || 'EMPLEO'}</span>
                <span class="bg-surface-variant text-secondary px-2 py-0.5 text-[10px] font-bold uppercase tracking-tighter border border-primary">${e.departamento}</span>
              </div>
              <h4 class="font-headline-md text-xl uppercase text-primary group-hover:underline decoration-2 mb-2">${e.titulo}</h4>
              <p class="font-label-bold text-label-sm uppercase tracking-wider text-secondary mb-3">${e.empresa} • ${fecha}</p>
            </div>
            <a href="/" class="bg-primary text-on-primary px-4 py-2 font-label-bold uppercase text-xs border-2 border-primary neo-shadow text-center transition-all hover:-translate-y-0.5">VER EMPLEO</a>
          </div>`;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', cargarFavoritos);
  </script>
</body>
</html>
